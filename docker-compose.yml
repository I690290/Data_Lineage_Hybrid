services:
  neo4j:
    image: neo4j:5-community
    container_name: lineage-neo4j
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j_lineage}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-neo4j_lineage}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  neo4j_data:
